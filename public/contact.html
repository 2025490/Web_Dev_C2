<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation bar with links to all pages -->
    <div class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <!-- Main contact content -->
    <div class="content">
        <h1>Contact Us</h1>
        <p>Have a question or need help? Send us a message and we will get back to you.</p>

        <!-- Contact form with proper label bindings as required -->
        <div class="contact-form">
            <h2>Send a Message</h2>

            <!-- Name field - label uses 'for' attribute to bind to input id -->
            <!-- This fixes the label binding issue from CA1 feedback -->
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name">
            <!-- Inline error message displayed next to field instead of alert() -->
            <span class="error-message" id="name-error"></span>

            <!-- Phone field with proper label binding -->
            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" placeholder="Enter your phone number">
            <span class="error-message" id="phone-error"></span>

            <!-- Email field with proper label binding -->
            <label for="email">Email Address:</label>
            <input type="text" id="email" placeholder="Enter your email address">
            <span class="error-message" id="email-error"></span>

            <!-- Message field with proper label binding -->
            <label for="message">Message:</label>
            <textarea id="message" placeholder="Enter your message (minimum 20 characters)"></textarea>
            <span class="error-message" id="message-error"></span>

            <button onclick="validateForm()">Send Message</button>

            <!-- Success message shown inline after successful submission -->
            <div id="form-success" class="success-message"></div>
        </div>
    </div>

    <!-- Footer present on all pages -->
    <div class="footer">
        <p>&copy; 2025 GameStore | Matheus Sodre | CCT College Dublin</p>
        <p>
            <a href="index.html">Home</a> |
            <a href="products.html">Products</a> |
            <a href="cart.html">Cart</a> |
            <a href="contact.html">Contact</a>
        </p>
    </div>

    <!-- JavaScript file that handles form validation -->
    <script src="js/contact.js"></script>

</body>
</html>
