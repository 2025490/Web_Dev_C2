<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Checkout</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation bar with links to all pages -->
    <div class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <!-- Main checkout content -->
    <div class="content">
        <h1>Checkout</h1>
        <p>Complete your order by filling in your details below.</p>

        <!-- Order summary loaded dynamically from the cart -->
        <div class="info-box">
            <h2>Order Summary</h2>
            <div id="checkout-summary"></div>
            <h3>Total: <span id="checkout-total">€0.00</span></h3>
        </div>

        <!-- Customer details form -->
        <div class="contact-form">
            <h2>Your Details</h2>

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" placeholder="Enter your full name">
            <span class="error-message" id="fullname-error"></span>

            <label for="email">Email Address:</label>
            <input type="email" id="email" placeholder="Enter your email">
            <span class="error-message" id="email-error"></span>

            <label for="address">Delivery Address:</label>
            <input type="text" id="address" placeholder="Enter your delivery address">
            <span class="error-message" id="address-error"></span>

            <label for="card">Card Number:</label>
            <input type="text" id="card" placeholder="Enter your 16 digit card number">
            <span class="error-message" id="card-error"></span>

            <button onclick="placeOrder()">Place Order</button>

            <div id="order-success" class="success-message"></div>
        </div>
    </div>

    <!-- Footer present on all pages -->
    <div class="footer">
        <p>&copy; 2025 GameStore | Matheus Sodre | CCT College Dublin</p>
        <p>
            <a href="index.html">Home</a> |
            <a href="products.html">Products</a> |
            <a href="cart.html">Cart</a> |
            <a href="contact.html">Contact</a>
        </p>
    </div>

    <script src="js/checkout.js"></script>

</body>
</html>
